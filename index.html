<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>love MaB </title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main: #2a0216; 
            --pink-glow: #ff85a2; 
            --glass: rgba(255, 255, 255, 0.1); 
            --light-pink: #ffb6c1; 
            --silver-glass: rgba(224, 224, 224, 0.2); 
            --violet-pink: linear-gradient(135deg, rgba(255, 105, 180, 0.4), rgba(199, 21, 133, 0.4)); 
            --royal-gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-text: #fcf6ba;
        }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #0f0101; color: white; overflow-x: hidden; text-align: center; width: 100%; position: relative; }
        
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
        
        .bg-heart { position: absolute; color: var(--light-pink); opacity: 0.6; animation: floatUp 6s infinite linear; pointer-events: none; }
        @keyframes floatUp { from { transform: translateY(110vh) rotate(0deg); } to { transform: translateY(-10vh) rotate(360deg); } }

        .premium-btn {
            background: var(--silver-glass); border: 1.5px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px); color: #fff; padding: 12px 30px; border-radius: 40px;
            font-weight: 700; font-size: 15px; cursor: pointer; position: relative;
            overflow: hidden; transition: 0.4s; box-shadow: 0 5px 20px rgba(255,255,255,0.1);
            display: inline-block; margin-top: 15px;
        }
        .premium-btn:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-2px); }

        .kiss-float {
            position: fixed; bottom: 30px; left: 20px; width: 60px; height: 60px;
            background: var(--silver-glass); border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px); border-radius: 50%; display: none;
            align-items: center; justify-content: center; font-size: 28px;
            z-index: 9999; cursor: pointer; animation: pulse-silver 2s infinite;
        }
        @keyframes pulse-silver { 0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); } }

        .envelope-capsule {
            width: 170px; height: 55px; 
            background: var(--violet-pink);
            border: 1.5px solid rgba(255, 255, 255, 0.6); backdrop-filter: blur(15px);
            border-radius: 40px; display: flex; align-items: center; justify-content: center;
            gap: 12px; margin: 0 auto 30px auto; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.5);
            animation: smooth-pulse 2.5s infinite ease-in-out;
        }

        /* --- حل مشكلة الاستوري: العرض الكامل بدقة --- */
        .stories-outer-wrap {
            width: 100vw;
            margin-left: -20px; /* لإلغاء البادينج بتاع السكشن */
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .stories-outer-wrap::-webkit-scrollbar { display: none; }

        .stories-container {
            display: inline-flex; /* لضمان تمدد العناصر أفقياً */
            padding: 10px 20px; 
            gap: 15px; 
        }

        .story-item { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .story-ring {
            width: 75px; height: 75px; border-radius: 50%;
            padding: 3px; background: linear-gradient(45deg, #ff85a2, #ffb6c1, #c71585, #db7093, #ff69b4);
            transition: 0.3s; box-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
        }
        .story-img-box { width: 100%; height: 100%; border-radius: 50%; background: #0f0101; padding: 2px; overflow: hidden; }
        .story-img-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .story-date-tag { font-size: 11px; margin-top: 8px; font-weight: 700; color: #fcf6ba; }
        
        /* باقي الاستايلات كما هي */
        section { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 2; width: 100%; }
        .active { display: flex; }
        .glass-box { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); border-radius: 40px; padding: 35px 20px; width: 95%; max-width: 420px; }
        .gold-title { background: var(--royal-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .premium-btn, .fancy-trigger-btn, .royal-flower-btn { cursor: pointer; outline: none; }
        input { width: 90%; padding: 15px; margin: 20px 0; border-radius: 20px; border: 1.5px solid var(--pink-glow); background: rgba(0,0,0,0.6); color: white; text-align: center; }
        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin: 20px 0; }
        .time-card { background: rgba(255, 133, 162, 0.1); padding: 15px; border-radius: 20px; border-bottom: 3px solid var(--pink-glow); }
        .time-card span { display: block; font-size: 24px; color: var(--pink-glow); font-weight: 800; }
        .cards-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-bottom: 30px; }
        .flip-card { width: 100%; height: 125px; perspective: 1000px; position: relative; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 10px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
        .card-front { background: var(--violet-pink); }
        .card-back { background: #000; transform: rotateY(180deg); color: var(--pink-glow); }
        .photo-item { background: var(--glass); border-radius: 25px; padding: 12px; margin-bottom: 30px; width: 100%; }
        .photo-item img { width: 100%; border-radius: 20px; }
        #backBtn, .music-control-fixed { position: fixed; z-index: 10000; background: var(--glass); border: 1px solid var(--pink-glow); color: var(--pink-glow); width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; }
        #backBtn { top: 20px; right: 20px; }
        .music-control-fixed { top: 20px; left: 20px; }
        .music-player-fixed { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(42, 2, 22, 0.9); border: 1px solid var(--pink-glow); border-radius: 50px; padding: 10px 20px; display: none; align-items: center; gap: 12px; z-index: 9999; }
        .story-viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 30000; display: none; align-items: center; justify-content: center; }
        .story-viewer.active { display: flex; }
    </style>
</head>
<body>

    <div class="bg-container" id="bg"></div>
    <div id="backBtn" onclick="goBack()">➜</div>
    <div id="mBtnFixed" class="music-control-fixed" onclick="toggleM()">🎵</div>
    <div id="kissBtn" class="kiss-float" onclick="giveKiss()">💋</div>

    <audio id="audio" loop><source src="m2.mp3" type="audio/mpeg"></audio>

    <section id="p1" class="active">
        <div class="glass-box">
            <div style="font-size: 50px;">💞</div>
            <h2 style="color:var(--pink-glow)">نورتي قلبي يا مزة😉</h2>
            <input type="text" id="pw" placeholder="الباسورد بقا👀">
            <div class="premium-btn" onclick="checkPw()">خشي برجلك اليمين 😂🤨</div>
        </div>
    </section>

    <section id="p2">
        <div class="glass-box">
            <div class="cards-container">
                <div class="flip-card" onclick="this.classList.toggle('flipped')">
                    <div class="flip-card-inner">
                        <div class="card-front">دوسي متخافيش..😂</div>
                        <div class="card-back">ع فكره مش بحب اشوفك زعلانه!</div>
                    </div>
                </div>
                <div class="flip-card" onclick="this.classList.toggle('flipped')">
                    <div class="flip-card-inner">
                        <div class="card-front">فاكرة اول يوم!</div>
                        <div class="card-back">24/6/24 <br> أول نظرة 😍</div>
                    </div>
                </div>
            </div>
            <h3 class="gold-title">حكايتنا بدأت من..</h3>
            <div class="timer-grid">
                <div class="time-card"><span id="dd">0</span>يوم</div>
                <div class="time-card"><span id="hh">0</span>ساعة</div>
                <div class="time-card"><span id="mm">0</span>دقيقة</div>
                <div class="time-card"><span id="ss">0</span>ثانية</div>
            </div>
            <button class="premium-btn" onclick="showPage('p3')">لحظات عشناها سوا..🫵🏻</button>
        </div>
    </section>

    <section id="p3" style="justify-content: flex-start; padding-top: 80px;">
        <div class="envelope-capsule" onclick="giveFlower()"><span>دوسي هنا🫵🏻</span></div>
        
        <div class="stories-outer-wrap">
            <div class="stories-container">
                <div class="story-item" onclick="openStory('m6')"><div class="story-ring"><div class="story-img-box"><img src="m6"></div></div><div class="story-date-tag">27/11</div></div>
                <div class="story-item" onclick="openStory('m7')"><div class="story-ring"><div class="story-img-box"><img src="m7"></div></div><div class="story-date-tag">16/8</div></div>
                <div class="story-item" onclick="openStory('m8')"><div class="story-ring"><div class="story-img-box"><img src="m8"></div></div><div class="story-date-tag">18/1</div></div>
                <div class="story-item" onclick="openStory('m9')"><div class="story-ring"><div class="story-img-box"><img src="m9"></div></div><div class="story-date-tag">27/3</div></div>
                <div class="story-item" onclick="openStory('m10')"><div class="story-ring"><div class="story-img-box"><img src="m10"></div></div><div class="story-date-tag">أجمل لحظة</div></div>
            </div>
        </div>

        <h2 class="gold-title">فيه احلى من كده👀</h2>
        <div class="photo-item"><img src="m1"><p>أول مره اشوف القمر فيها💓</p></div>
        <div class="photo-item"><img src="m2"><p>البدايات اللي منسيتهاش 💕</p></div>
        <button class="premium-btn" onclick="showPage('p4')">مفاجأه هنا🫣</button>
    </section>

    <section id="p4">
        <div class="glass-box">
            <p id="finalMsg" style="line-height: 1.8; text-align: right;"></p>
            <button class="premium-btn" onclick="giveKiss()">خدي بوسة 💋</button>
        </div>
    </section>

    <div id="storyViewer" class="story-viewer" onclick="this.classList.remove('active')">
        <img id="viewImg" style="max-width: 90%; border-radius: 15px; border: 2px solid var(--pink-glow);">
    </div>

    <script>
        function createStars() {
            const bg = document.getElementById('bg');
            for(let i=0; i<30; i++) {
                const s = document.createElement('div'); s.className = 'star';
                s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
                s.style.width = s.style.height = Math.random()*3+'px';
                s.style.setProperty('--d', (Math.random()*3+2)+'s'); bg.appendChild(s);
            }
        }
        createStars();

        function checkPw() {
            if(document.getElementById('pw').value === 'm123') {
                showPage('p2'); document.getElementById('audio').play();
                document.getElementById('mBtnFixed').style.display = 'flex';
                document.getElementById('backBtn').style.display = 'flex';
                document.getElementById('kissBtn').style.display = 'flex';
                setInterval(updateTimer, 1000);
            } else { alert("الباسورد غلط! 😉"); }
        }

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
            if(id === 'p4') {
                const text = "أنتي أجمل حاجة حصلتلي في حياتي.. ربنا يخليكي ليا يا أغلى من روحي 💓";
                let i = 0; document.getElementById('finalMsg').innerHTML = "";
                function type() { if(i < text.length) { document.getElementById('finalMsg').innerHTML += text.charAt(i); i++; setTimeout(type, 50); } }
                type();
            }
        }

        function goBack() {
            let current = document.querySelector('section.active').id;
            if(current === 'p2') showPage('p1');
            else if(current === 'p3') showPage('p2');
            else if(current === 'p4') showPage('p3');
        }

        function updateTimer() {
            const start = new Date("2023-04-14T00:00:00");
            const now = new Date();
            const diff = now - start;
            document.getElementById("dd").innerText = Math.floor(diff / 86400000);
            document.getElementById("hh").innerText = Math.floor((diff / 3600000) % 24);
            document.getElementById("mm").innerText = Math.floor((diff / 60000) % 60);
            document.getElementById("ss").innerText = Math.floor((diff / 1000) % 60);
        }

        function toggleM() {
            const a = document.getElementById('audio');
            a.paused ? a.play() : a.pause();
        }

        function openStory(src) {
            document.getElementById('viewImg').src = src;
            document.getElementById('storyViewer').classList.add('active');
        }

        function giveKiss() {
            for(let i=0; i<10; i++) {
                const k = document.createElement('div'); k.innerHTML = '💋';
                k.style.position = 'fixed'; k.style.left = Math.random()*100+'vw'; k.style.bottom = '0';
                k.style.fontSize = '30px'; k.style.transition = '2s'; document.body.appendChild(k);
                setTimeout(() => { k.style.transform = 'translateY(-100vh)'; k.style.opacity = '0'; }, 100);
                setTimeout(() => k.remove(), 2000);
            }
        }
    </script>
</body>
</html>
